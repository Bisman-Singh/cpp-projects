<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTTP Server</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 3rem;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 600px;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: #a78bfa; }
        p { font-size: 1.1rem; line-height: 1.8; color: #c4b5fd; }
        .badge {
            display: inline-block;
            margin-top: 1.5rem;
            padding: 0.5rem 1.5rem;
            background: #7c3aed;
            border-radius: 999px;
            font-size: 0.9rem;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>C++ HTTP Server</h1>
        <p>This page is being served by a minimal HTTP/1.1 server written in C++ using POSIX sockets.</p>
        <span class="badge">Running on C++17</span>
    </div>
</body>
</html>
